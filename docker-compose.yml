services:
  # ─────────────────────────────────────────────
  # PostgreSQL — lưu users/interactions
  # ─────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: movie-recommender-db
    environment:
      POSTGRES_USER: movieapp
      POSTGRES_PASSWORD: movieapp
      POSTGRES_DB: movie_recommender
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U movieapp -d movie_recommender"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ─────────────────────────────────────────────
  # AI Engine — chạy một lần để build model
  # Dùng: docker compose run --rm ai_engine
  # ─────────────────────────────────────────────
  ai_engine:
    build:
      context: ./ai_engine
      dockerfile: Dockerfile
    container_name: movie-recommender-ai
    volumes:
      # WORKDIR = /app/ai_engine, script dùng ../data → trỏ đúng /app/data
      - ./data:/app/data
    env_file:
      - .env
    profiles:
      - tools   # Không tự chạy cùng `docker compose up`

  # ─────────────────────────────────────────────
  # Backend — FastAPI REST API
  # ─────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: movie-recommender-backend
    ports:
      - "8000:8000"
    volumes:
      # Mount data (models + processed CSV) vào container tại /app/data
      - ./data:/app/data
    env_file:
      - .env
    environment:
      # Override DATA_DIR cho Docker (mặc định trong config.py là ../data cho local dev)
      DATA_DIR: /app/data
      DATABASE_URL: postgresql+psycopg2://movieapp:movieapp@db:5432/movie_recommender
      DB_ECHO: "false"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    # Chỉ khởi động sau khi ai_engine đã xuất model (tùy chọn)
    # depends_on:
    #   ai_engine:
    #     condition: service_completed_successfully

  # ─────────────────────────────────────────────
  # Frontend — Next.js (chưa tạo, bật sau)
  # ─────────────────────────────────────────────
  # frontend:
  #   build:
  #     context: ./frontend
  #     dockerfile: Dockerfile
  #   container_name: movie-recommender-frontend
  #   ports:
  #     - "3000:3000"
  #   environment:
  #     - NEXT_PUBLIC_API_URL=http://backend:8000
  #   depends_on:
  #     - backend
  #   restart: unless-stopped

volumes:
  postgres_data:
